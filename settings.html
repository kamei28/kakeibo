<!doctype html>
<html lang="ja">
    <head>
        <meta charset="utf-8">
        <meta name="robots" content="noindex">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>家計簿</title>
        <link rel="icon" type="image/png" href="./img/icon.png">
        <link rel="stylesheet" href="./stylesheet/main.css">
        <link rel="stylesheet" href="./stylesheet/form.css">
        <link rel="stylesheet" href="./stylesheet/settings.css">
        <script type="text/javascript" src="./script/main.js" defer></script>
        <script type="text/javascript" src="./script/settings.js" defer></script>

    </head>
    <body class="container">
        <header class="top-bar">
            <h1 class="page-name">家計簿入力</h1>
            <ul class="relation-link">
                <li id="main-app">家計簿アプリ</li>
                <li id="settings" class="hidden">家計簿設定</li>
                <li id="data-link">集計データ</li>
                <li id="tech-link">技術リンク</li>
            </ul>
        </header>

        <div class="hidden" id="acc-submit"></div>
        <div class="hidden" id="money-submit"></div>

        <main class="main-content">
            <ul class="subtitle" id="money-info">
                <li class="money-exp">必ず各URLを設定してください。</li>
                <li class="notice" id="status">状態：未登録</li>
            </ul>

            <div class="space"></div>
            <h3 class="subtitle">家計簿設定</h3>
            <ul id="accbook-form" method="POST">
                <li class="set-gas-url">
                    <label for="i-gas_url">GAS URL</label>
                    <input type="text" id="i-gas_url" placeholder="YOUR_GAS_URL">
                </li>
                <li class="set-sheet-url">
                    <label for="i-gss_url">GSS URL</label>
                    <input type="text" id="i-gss_url" placeholder="YOUR_SHEET_URL">
                </li>
                <li class="save-mydata">
                    <input type="button" id="save-data" value="保 存">
                </li>
            </ul>

            <div class="space"></div>

            <ul class="subtitle" id="money-info">
                <li class="money-exp">GAS, GSSの設定方法</li>
                <li class="notice">➀<a href="https://docs.google.com/spreadsheets/d/1R3pGTbmU_3VK1MM0KrS_vFDL4H8_OdJMr-u8ed0_u2o/edit?usp=sharing" target="_blank">スプレッドシート</a>のコピーを作成。</li>
                <li class="notice">➁拡張機能からApps Scriptを起動。</li>
                <li class="notice">➃ウェブアプリで新たにデプロイしてURLをコピー。</li>
                <li class="notice">➄このフォームに入力して保存。</li>
            </ul>
        </main>

        <footer class="bottom-bar">
            <!-- <ul class="tech-link">
                <li>GoogleAppScript</li>
                <li>GitHub</li>
            </ul> -->
            <div class="copyright">Copyright © 2026 kamei28. All Rights Reserved.</div>
        </footer>
    </body>
</html>
